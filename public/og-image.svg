<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#3b82f6" opacity="0.3"/>
  <circle cx="1100" cy="530" r="250" fill="#1e40af" opacity="0.3"/>
  <circle cx="900" cy="100" r="150" fill="#60a5fa" opacity="0.2"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- PDF Document mockup -->
  <g filter="url(#shadow)" transform="translate(720, 140)">
    <rect x="0" y="0" width="380" height="350" rx="12" fill="url(#cardGradient)"/>
    <!-- PDF header bar -->
    <rect x="0" y="0" width="380" height="45" rx="12" fill="#f1f5f9"/>
    <rect x="0" y="35" width="380" height="10" fill="#f1f5f9"/>
    <!-- Window controls -->
    <circle cx="25" cy="22" r="6" fill="#ef4444"/>
    <circle cx="47" cy="22" r="6" fill="#eab308"/>
    <circle cx="69" cy="22" r="6" fill="#22c55e"/>
    <!-- Form fields -->
    <rect x="30" y="70" width="320" height="35" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="45" y="94" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Full Name</text>
    <rect x="30" y="120" width="320" height="35" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="45" y="144" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Email Address</text>
    <rect x="30" y="170" width="150" height="35" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="45" y="194" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Date</text>
    <rect x="200" y="170" width="150" height="35" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="215" y="194" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Phone</text>
    <!-- Signature area -->
    <rect x="30" y="230" width="320" height="80" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="140" y="275" font-family="system-ui, sans-serif" font-size="14" fill="#a16207">Signature</text>
    <!-- Pen cursor -->
    <g transform="translate(280, 250)" filter="url(#glow)">
      <path d="M0 24L4 0L24 20L12 22L0 24Z" fill="#2563eb"/>
      <path d="M4 0L8 4L0 24L4 0Z" fill="#1e40af"/>
    </g>
  </g>
  
  <!-- Logo and text -->
  <g transform="translate(80, 180)">
    <!-- Logo icon -->
    <rect x="0" y="0" width="70" height="70" rx="16" fill="white"/>
    <g transform="translate(15, 15)">
      <path d="M10 5L30 5L30 35L10 35L10 5Z" fill="#3b82f6"/>
      <path d="M5 10L25 10L25 40L5 40L5 10Z" fill="#1e40af"/>
      <path d="M15 20L35 20L35 25L15 25Z" fill="#60a5fa"/>
      <path d="M15 28L30 28L30 33L15 33Z" fill="#60a5fa"/>
    </g>
    
    <!-- App name -->
    <text x="0" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="white">
      Drajonz
    </text>
    
    <!-- Tagline -->
    <text x="0" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#bfdbfe">
      Fill PDF Forms Smarter &amp; Faster
    </text>
    
    <!-- Features -->
    <g transform="translate(0, 210)">
      <g transform="translate(0, 0)">
        <circle cx="10" cy="10" r="10" fill="#22c55e"/>
        <path d="M6 10L9 13L14 7" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="30" y="15" font-family="system-ui, sans-serif" font-size="18" fill="#e0f2fe">Drag &amp; Drop Editor</text>
      </g>
      <g transform="translate(0, 40)">
        <circle cx="10" cy="10" r="10" fill="#22c55e"/>
        <path d="M6 10L9 13L14 7" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="30" y="15" font-family="system-ui, sans-serif" font-size="18" fill="#e0f2fe">Cloud Storage</text>
      </g>
      <g transform="translate(0, 80)">
        <circle cx="10" cy="10" r="10" fill="#22c55e"/>
        <path d="M6 10L9 13L14 7" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="30" y="15" font-family="system-ui, sans-serif" font-size="18" fill="#e0f2fe">Digital Signatures</text>
      </g>
    </g>
  </g>
</svg>